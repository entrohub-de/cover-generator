<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrohub 封面生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background: #f5f5fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .wrapper {
            display: flex;
            gap: 40px;
            max-width: 1000px;
            width: 100%;
            align-items: flex-start;
        }
        .input-panel {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .logo img { width: 40px; height: 40px; }
        .logo span { font-size: 20px; font-weight: 700; color: #212121; }
        h1 {
            font-size: 24px;
            color: #212121;
            margin-bottom: 8px;
        }
        p.subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .category-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .cat-btn {
            width: auto;
            padding: 6px 14px;
            font-size: 13px;
            border-radius: 20px;
            background: #f0f0f5;
            color: #666;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .cat-btn:hover {
            background: #e8e8ee;
        }
        .cat-btn.active {
            background: white;
            color: var(--cat-color);
            border-color: var(--cat-color);
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .slider-row label {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
        }
        .slider-row input[type="range"] {
            flex: 1;
            accent-color: #4285F4;
        }
        .slider-row span {
            font-size: 13px;
            color: #888;
            min-width: 28px;
            text-align: right;
        }
        textarea {
            width: 100%;
            height: 140px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #4285F4;
        }
        .char-count {
            text-align: right;
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
            margin-bottom: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #4285F4;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #1E40AF; }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .placeholder-box {
            width: 100%;
            max-width: 360px;
            aspect-ratio: 3/4;
            background: #e8e8ee;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 14px;
        }
        .preview { display: none; width: 100%; max-width: 360px; }
        .preview img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .download-btn {
            max-width: 360px;
            background: #212121;
            display: none;
        }
        .download-btn:hover { background: #000; }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #4285F4;
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #4285F4;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        .hint {
            font-size: 12px;
            color: #aaa;
            margin-top: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            .output-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="input-panel">
            <div class="logo">
                <img src="/logo.png" alt="Entrohub">
                <span>Entrohub</span>
            </div>

            <h1>封面生成器</h1>
            <p class="subtitle">输入标题，一键生成小红书封面图 (1080×1440)</p>

            <div class="category-bar" id="categoryBar">
                <button class="cat-btn active" data-cat="" style="--cat-color: #4285F4">全部</button>
                <button class="cat-btn" data-cat="创业洞察" style="--cat-color: #4285F4">创业洞察</button>
                <button class="cat-btn" data-cat="成员故事" style="--cat-color: #E8734A">成员故事</button>
                <button class="cat-btn" data-cat="活动预告" style="--cat-color: #34A853">活动预告</button>
                <button class="cat-btn" data-cat="幕后故事" style="--cat-color: #8E44DF">幕后故事</button>
                <button class="cat-btn" data-cat="活动复盘" style="--cat-color: #E9517F">活动复盘</button>
            </div>

            <textarea id="title" placeholder="输入封面标题文字，比如：&#10;两个陌生人在聚会上聊了30分钟&#10;当场加了联系方式" maxlength="100"></textarea>
            <div class="char-count"><span id="count">0</span>/100</div>

            <div class="slider-row">
                <label>字体大小</label>
                <input type="range" id="fontSize" min="40" max="120" value="72" step="4">
                <span id="fontSizeVal">72</span>
            </div>

            <button id="generateBtn" onclick="generate()">生成封面</button>
            <p class="hint">Cmd+Enter 快速生成</p>
        </div>

        <div class="output-panel">
            <div class="placeholder-box" id="placeholderBox">封面预览区</div>
            <div class="loading" id="loading">生成中</div>
            <div class="preview" id="preview">
                <img id="coverImg" alt="封面预览">
            </div>
            <button class="download-btn" id="downloadBtn" onclick="download()">下载封面图</button>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('title');
        const count = document.getElementById('count');

        let debounceTimer = null;
        let selectedCategory = '';
        const fontSlider = document.getElementById('fontSize');
        const fontSizeVal = document.getElementById('fontSizeVal');

        fontSlider.addEventListener('input', () => {
            fontSizeVal.textContent = fontSlider.value;
            clearTimeout(debounceTimer);
            if (textarea.value.trim()) {
                debounceTimer = setTimeout(generate, 300);
            }
        });

        // 栏目选择
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedCategory = btn.dataset.cat;
                if (textarea.value.trim()) generate();
            });
        });

        textarea.addEventListener('input', () => {
            count.textContent = textarea.value.length;
            clearTimeout(debounceTimer);
            if (textarea.value.trim()) {
                debounceTimer = setTimeout(generate, 500);
            }
        });

        let currentBlob = null;

        async function generate() {
            const title = textarea.value.trim();
            if (!title) return;

            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const preview = document.getElementById('preview');
            const placeholder = document.getElementById('placeholderBox');
            const downloadBtn = document.getElementById('downloadBtn');

            btn.disabled = true;
            loading.style.display = 'block';
            preview.style.display = 'none';
            downloadBtn.style.display = 'none';
            placeholder.style.display = 'none';

            try {
                const res = await fetch(`/api?title=${encodeURIComponent(title)}&category=${encodeURIComponent(selectedCategory)}&fontsize=${fontSlider.value}`);
                if (!res.ok) throw new Error('生成失败');

                const blob = await res.blob();
                currentBlob = blob;

                const img = document.getElementById('coverImg');
                img.src = URL.createObjectURL(blob);
                preview.style.display = 'block';
                downloadBtn.style.display = 'block';
            } catch (e) {
                placeholder.style.display = 'flex';
                alert('生成失败，请重试');
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function download() {
            if (!currentBlob) return;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(currentBlob);
            a.download = 'entrohub-cover.png';
            a.click();
        }

        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.metaKey) {
                e.preventDefault();
                generate();
            }
        });
    </script>
</body>
</html>
